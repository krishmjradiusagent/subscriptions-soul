<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../components.css"><style>
body{margin:0;padding:24px;background:#fff;display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.col{display:flex;flex-direction:column;gap:10px}
.row{display:flex;align-items:center;gap:10px;font-size:14px}
h4{margin:0 0 4px;font:600 12px var(--font-ui);color:var(--muted-foreground);letter-spacing:.02em;text-transform:uppercase}
</style></head><body>
<div class="col">
  <h4>Switch</h4>
  <div class="row"><span class="r-switch"></span> Off</div>
  <div class="row"><span class="r-switch on"></span> On</div>
</div>
<div class="col">
  <h4>Checkbox</h4>
  <div class="row"><span class="r-checkbox"></span> Unchecked</div>
  <div class="row"><span class="r-checkbox on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span> Checked</div>
</div>
<div class="col">
  <h4>Radio</h4>
  <div class="row"><span class="r-radio"></span> Not selected</div>
  <div class="row"><span class="r-radio on"></span> Selected</div>
</div>
</body></html>

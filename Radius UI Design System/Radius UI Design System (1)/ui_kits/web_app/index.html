<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radius UI — Web App</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../../components.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: var(--neutral-50); }
  body { font-family: var(--font-body); color: var(--foreground); }
  @keyframes rFadeIn { from {opacity:0} to {opacity:1} }
  @keyframes rDialogIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  button { font-family: inherit; }
  /* Scrollbar tune */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--neutral-300); border-radius: 999px; border: 2px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: var(--neutral-400); background-clip: content-box; border: 2px solid transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react" src="icons.jsx"></script>
<script type="text/babel" data-presets="react" src="components.jsx"></script>
<script type="text/babel" data-presets="react" src="Sidebar.jsx"></script>
<script type="text/babel" data-presets="react" src="Topbar.jsx"></script>
<script type="text/babel" data-presets="react" src="Dashboard.jsx"></script>
<script type="text/babel" data-presets="react" src="Customers.jsx"></script>
<script type="text/babel" data-presets="react" src="Settings.jsx"></script>
<script type="text/babel" data-presets="react" src="App.jsx"></script>
</body>
</html>

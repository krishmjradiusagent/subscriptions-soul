<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;font-family:var(--font-body);background:#fff}

.sw{flex:1;height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-size:10px;font-family:var(--font-mono)}
.lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--muted-foreground);margin-top:8px;font-family:var(--font-body)}
.lbl span{flex:1;text-align:center}
</style></head><body>
<div class="row">
<div class="sw" style="background:#FAFAFA;color:#171717">50</div>
<div class="sw" style="background:#F5F5F5;color:#171717">100</div>
<div class="sw" style="background:#E5E5E5;color:#171717">200</div>
<div class="sw" style="background:#D4D4D4;color:#171717">300</div>
<div class="sw" style="background:#A3A3A3;color:#fff">400</div>
<div class="sw" style="background:#737373;color:#fff">500</div>
<div class="sw" style="background:#525252;color:#fff">600</div>
<div class="sw" style="background:#404040;color:#fff">700</div>
<div class="sw" style="background:#262626;color:#fff">800</div>
<div class="sw" style="background:#171717;color:#fff">900</div>
<div class="sw" style="background:#0A0A0A;color:#fff">950</div>
</div>
</body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#fff}
.row{display:flex;gap:16px;align-items:flex-end}
.tile{display:flex;flex-direction:column;align-items:center;gap:8px}
.box{width:64px;height:64px;background:var(--neutral-100);border:1px solid var(--border)}
.lbl{font-size:10px;color:var(--muted-foreground);font-family:var(--font-mono)}
</style></head><body>
<div class="row">
<div class="tile"><div class="box" style="border-radius:0"></div><div class="lbl">none / 0</div></div>
<div class="tile"><div class="box" style="border-radius:4px"></div><div class="lbl">sm / 4</div></div>
<div class="tile"><div class="box" style="border-radius:6px"></div><div class="lbl">md / 6</div></div>
<div class="tile"><div class="box" style="border-radius:8px;background:#5A5FF2;border:0"></div><div class="lbl">— default 8</div></div>
<div class="tile"><div class="box" style="border-radius:10px"></div><div class="lbl">lg / 10</div></div>
<div class="tile"><div class="box" style="border-radius:12px"></div><div class="lbl">xl / 12</div></div>
<div class="tile"><div class="box" style="border-radius:16px"></div><div class="lbl">2xl / 16</div></div>
<div class="tile"><div class="box" style="border-radius:9999px"></div><div class="lbl">full</div></div>
</div>
</body></html>

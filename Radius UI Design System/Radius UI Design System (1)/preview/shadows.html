<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--neutral-100)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
.tile{display:flex;flex-direction:column;align-items:center;gap:12px}
.box{width:100%;height:64px;background:#fff;border-radius:8px}
.lbl{font-size:11px;color:var(--muted-foreground);font-family:var(--font-mono)}
</style></head><body>
<div class="grid">
<div class="tile"><div class="box" style="box-shadow:var(--shadow-2xs)"></div><div class="lbl">2xs</div></div>
<div class="tile"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="lbl">xs</div></div>
<div class="tile"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lbl">sm</div></div>
<div class="tile"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lbl">md</div></div>
<div class="tile"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lbl">lg</div></div>
<div class="tile"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="lbl">xl</div></div>
<div class="tile"><div class="box" style="box-shadow:var(--shadow-2xl)"></div><div class="lbl">2xl</div></div>
<div class="tile"><div class="box" style="box-shadow:none;border:1px solid var(--border)"></div><div class="lbl">none + border</div></div>
</div>
</body></html>

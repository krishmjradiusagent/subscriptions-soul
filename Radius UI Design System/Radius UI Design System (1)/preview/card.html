<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../components.css"><style>
body{margin:0;padding:24px;background:var(--neutral-50)}
</style></head><body>
<div class="r-card" style="max-width:420px">
  <div class="r-card-header">
    <h3 class="r-card-title">Create project</h3>
    <p class="r-card-desc">Deploy your new project in one click.</p>
  </div>
  <div style="display:flex;flex-direction:column;gap:12px">
    <div style="display:flex;flex-direction:column;gap:6px">
      <label class="r-label">Name</label>
      <input class="r-input" placeholder="Name of your project">
    </div>
    <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end">
      <button class="r-btn r-btn-outline">Cancel</button>
      <button class="r-btn r-btn-primary">Deploy</button>
    </div>
  </div>
</div>
</body></html>

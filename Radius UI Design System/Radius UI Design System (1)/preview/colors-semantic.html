<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;font-family:var(--font-body);background:#fff}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.tile{border:1px solid var(--border);border-radius:8px;overflow:hidden}
.swatch{height:64px}
.meta{padding:8px 10px}
.name{font-size:12px;font-weight:600;color:var(--foreground)}
.hex{font-size:11px;color:var(--muted-foreground);font-family:var(--font-mono)}
</style></head><body>
<div class="grid">
<div class="tile"><div class="swatch" style="background:#5A5FF2"></div><div class="meta"><div class="name">Primary</div><div class="hex">#5A5FF2</div></div></div>
<div class="tile"><div class="swatch" style="background:#F5F5F5"></div><div class="meta"><div class="name">Secondary</div><div class="hex">#F5F5F5</div></div></div>
<div class="tile"><div class="swatch" style="background:#DC2626"></div><div class="meta"><div class="name">Destructive</div><div class="hex">#DC2626</div></div></div>
<div class="tile"><div class="swatch" style="background:#15A296"></div><div class="meta"><div class="name">Success</div><div class="hex">#15A296</div></div></div>
<div class="tile"><div class="swatch" style="background:#EAB308"></div><div class="meta"><div class="name">Warning</div><div class="hex">#EAB308</div></div></div>
<div class="tile"><div class="swatch" style="background:#3F8DFF"></div><div class="meta"><div class="name">Info</div><div class="hex">#3F8DFF</div></div></div>
<div class="tile"><div class="swatch" style="background:#9747FF"></div><div class="meta"><div class="name">Doc accent</div><div class="hex">#9747FF</div></div></div>
<div class="tile"><div class="swatch" style="background:#0A0A0A"></div><div class="meta"><div class="name">Foreground</div><div class="hex">#0A0A0A</div></div></div>
</div>
</body></html>
